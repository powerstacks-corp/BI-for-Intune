site_name: BI for Intune by PowerStacks
site_description: Comprehensive Power BI reporting for Microsoft Intune
site_url: https://powerstacks-corp.github.io/BI-for-Intune/

repo_url: https://github.com/powerstacks-corp/BI-for-Intune
repo_name: BI-for-Intune

docs_dir: docs

theme:
  name: material
  language: en
  font:
    text: Segoe UI
    code: Cascadia Code
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  custom_dir: docs/overrides

extra_css:
  - stylesheets/microsoft-learn.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - glightbox:
      skip_classes:
        - skip-lightbox

nav:
  - Home: index.md
  - Getting Started:
    - Install BI for Intune: guides/install-bi-for-intune.md
    - Request a Trial License: guides/request-a-trial-license.md
  - Setup Guide:
    - Create App Registration: guides/create-azure-ad-app-registration.md
    - Configure the Dataset: guides/configure-the-dataset.md
    - Export API Parameter: guides/export-api-parameter.md
    - Cloud PC Export API Parameter: guides/cloud-pc-export-api-parameter.md
    - Configure Data Sync: guides/configure-data-sync.md
    - Enable Maps: guides/enable-maps.md
  - Log Analytics Setup:
    - Connect Power BI to Log Analytics: guides/edit-azure-ad-app-registration.md
    - Dataset Settings for Log Analytics: guides/dataset-settings-for-custom-inventory.md
  - Custom Inventory:
    - Create Inventory App Registration: guides/create-inventory-app-registration.md
    - Deploy Custom Inventory Resources: guides/configure-log-analytics.md
    - Windows Inventory Collection Script: guides/windows-inventory-collection-script.md
    - macOS Inventory Collection Script: guides/macos-inventory-collection-script.md
  - WUfB Reports: guides/wufb-reports.md
  - Administration:
    - Dataset Parameters: guides/dataset-parameters.md
    - Azure AD App Permissions: guides/azure-ad-app-permissions.md
    - Backup Custom Reports: guides/backup-custom-reports.md
    - Perform In-place Upgrade: guides/perform-in-place-upgrade.md
    - Create Backup Workspace: guides/create-backup-workspace.md
  - Customization:
    - Installing a Custom Power BI Template: guides/installing-a-custom-power-bi-template.md
    - How to Edit BI for Intune Reports: guides/how-to-edit-bi-for-intune-reports.md
    - How to Create Popup Box Visuals: guides/how-to-create-popup-box-visuals.md
  - FAQ: guides/faq.md
  - Release Notes:
